<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>saving for a yozma</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#070b14;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle,#00a2ff55,transparent 70%);
      top:-200px;
      left:-150px;
      animation:float 8s ease-in-out infinite;
    }

    body::after{
      content:'';
      position:absolute;
      width:600px;
      height:600px;
      background:radial-gradient(circle,#6d28ff55,transparent 70%);
      bottom:-200px;
      right:-150px;
      animation:float 10s ease-in-out infinite reverse;
    }

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(30px);}
      100%{transform:translateY(0px);}
    }

    .card{
      width:90%;
      max-width:700px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(18px);
      border-radius:32px;
      padding:60px;
      text-align:center;
      position:relative;
      z-index:2;
      box-shadow:0 30px 80px rgba(0,0,0,0.45);
    }

    .badge{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(0,162,255,0.12);
      border:1px solid rgba(0,162,255,0.3);
      color:#7fd1ff;
      margin-bottom:25px;
      font-size:0.95rem;
    }

    h1{
      font-size:4rem;
      margin-bottom:18px;
      font-weight:800;
      letter-spacing:-2px;
    }

    .amount{
      font-size:5rem;
      font-weight:800;
      background:linear-gradient(90deg,#00b7ff,#7c4dff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:25px;
    }

    p{
      color:rgba(255,255,255,0.7);
      line-height:1.8;
      font-size:1.1rem;
      max-width:560px;
      margin:auto;
    }

    .progress-wrapper{
      margin-top:45px;
      text-align:left;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:14px;
      color:rgba(255,255,255,0.75);
      font-size:0.95rem;
    }

    .progress-bar{
      width:100%;
      height:22px;
      background:rgba(255,255,255,0.08);
      border-radius:999px;
      overflow:hidden;
      position:relative;
    }

    .progress{
      width:2.46%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#00b7ff,#7c4dff);
      position:relative;
      animation:load 2s ease;
    }

    @keyframes load{
      from{
        width:0%;
      }
    }

    .progress::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      animation:shine 2.5s infinite;
    }

    @keyframes shine{
      from{
        transform:translateX(-100%);
      }
      to{
        transform:translateX(200%);
      }
    }

    .bottom{
      margin-top:40px;
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .btn{
      padding:15px 28px;
      border-radius:16px;
      text-decoration:none;
      color:white;
      font-weight:700;
      transition:0.3s ease;
    }

    .primary{
      background:linear-gradient(90deg,#00a2ff,#6d28ff);
      box-shadow:0 10px 30px rgba(0,162,255,0.35);
    }

    .secondary{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
    }

    .btn:hover{
      transform:translateY(-4px);
    }

    @media(max-width:700px){
      h1{
        font-size:2.7rem;
      }

      .amount{
        font-size:3.5rem;
      }

      .card{
        padding:40px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Current Financial Goal</div>

    <h1>Goal Progress</h1>

    <div class="amount">
      $1,139.05
    </div>

    <p>
    btw does not update every second, I update it myself.
      saving for a yozma
    </p>

    <div class="progress-wrapper">
      <div class="progress-top">
        <span>Progress - Day 1 ($28)</span>
        <span>2.46%</span>
      </div>

      <div class="progress-bar">
        <div class="progress"></div>
      </div>
    </div>

    <div class="bottom">
      <a href="paypal.html" class="btn primary">Support Goal</a>
      <a href="learn.html" class="btn secondary">Learn More</a>
    </div>
  </div>


  <!-- WORLD CHAT -->
<style>
#chatToggle{
  position:fixed;
  bottom:25px;
  right:25px;
  width:70px;
  height:70px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,#00a2ff,#6d28ff);
  color:white;
  font-size:30px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 10px 35px rgba(0,0,0,0.45);
  transition:.3s;
}

#chatToggle:hover{
  transform:scale(1.08);
}

#worldChat{
  position:fixed;
  bottom:105px;
  right:25px;
  width:380px;
  height:580px;
  background:rgba(10,10,18,0.82);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:30px;
  overflow:hidden;
  display:none;
  flex-direction:column;
  z-index:9999;
  box-shadow:0 25px 70px rgba(0,0,0,0.5);
}

.chat-top{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.03);
  font-weight:700;
}

.chat-top span{
  color:#7fd1ff;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.msg-row{
  display:flex;
}

.my-row{
  justify-content:flex-end;
}

.other-row{
  justify-content:flex-start;
}

.msg{
  max-width:78%;
  padding:12px;
  border-radius:22px;
  display:flex;
  gap:10px;
  align-items:flex-start;
  animation:fade .25s ease;
}

.my-msg{
  background:linear-gradient(135deg,#00a2ff,#6d28ff);
  border-bottom-right-radius:8px;
}

.other-msg{
  background:rgba(255,255,255,0.06);
  border-bottom-left-radius:8px;
}

.msg img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  flex-shrink:0;
}

.msg-content{
  word-break:break-word;
}

.msg-content strong{
  display:block;
  margin-bottom:4px;
  font-size:.95rem;
}

.chat-input{
  display:flex;
  gap:10px;
  padding:15px;
  border-top:1px solid rgba(255,255,255,0.06);
}

.chat-input input{
  flex:1;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.06);
  padding:14px;
  border-radius:14px;
  color:white;
}

.chat-input button{
  border:none;
  padding:14px 18px;
  border-radius:14px;
  background:linear-gradient(135deg,#00a2ff,#6d28ff);
  color:white;
  cursor:pointer;
  font-weight:700;
}

#setupModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.setup-box{
  width:90%;
  max-width:420px;
  background:#111827;
  padding:35px;
  border-radius:30px;
  text-align:center;
}

.setup-box h2{
  margin-bottom:20px;
}

.setup-box input{
  width:100%;
  margin-bottom:15px;
  padding:14px;
  border:none;
  outline:none;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  color:white;
}

.setup-box button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#00a2ff,#6d28ff);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.preview{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:18px;
  border:3px solid rgba(255,255,255,0.1);
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:500px){
  #worldChat{
    width:95%;
    right:2.5%;
  }
}
</style>

<button id="chatToggle">💬</button>

<div id="worldChat">

  <div class="chat-top">
    <div>🌎 Worldwide Chat</div>
    <span>LIVE</span>
  </div>

  <div id="messages"></div>

  <div class="chat-input">
    <input
      type="text"
      id="messageInput"
      maxlength="180"
      placeholder="Type message..."
    >

    <button id="sendBtn">Send</button>
  </div>

</div>

<div id="setupModal">

  <div class="setup-box">

    <h2>Create Profile</h2>

    <img
      id="preview"
      class="preview"
      src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
    >

    <input
      type="text"
      id="usernameInput"
      maxlength="16"
      placeholder="Username"
    >

    <input
      type="file"
      id="pfpInput"
      accept="image/*"
    >

    <button id="saveProfile">
      Join Chat
    </button>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  query,
  limitToLast,
  remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuoYSA7Di1Dpz9-Ke2xcmhw7w8Hr5lny8",
  authDomain: "saving-for-a-yozma.firebaseapp.com",
  databaseURL: "https://saving-for-a-yozma-default-rtdb.firebaseio.com",
  projectId: "saving-for-a-yozma",
  storageBucket: "saving-for-a-yozma.firebasestorage.app",
  messagingSenderId: "1043912888044",
  appId: "1:1043912888044:web:c4b5440a12e52245385fc9",
  measurementId: "G-MR1V1L87TG"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const badWords = [
  "fuck",
  "shit",
  "bitch",
  "asshole",
  "nigga",
  "nigger",
  "fag",
  "dick",
  "pussy",
  "slut",
  "whore",
  "cunt"
];

const chatToggle = document.getElementById("chatToggle");
const worldChat = document.getElementById("worldChat");
const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const messages = document.getElementById("messages");

const setupModal = document.getElementById("setupModal");

let username = localStorage.getItem("chatUsername");
let profilePic = localStorage.getItem("chatPfp");

if(username && profilePic){
  setupModal.style.display = "none";
}

chatToggle.onclick = () => {

  worldChat.style.display =
    worldChat.style.display === "flex"
      ? "none"
      : "flex";

};

document
.getElementById("pfpInput")
.addEventListener("change", e => {

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = () => {

    document.getElementById("preview").src =
      reader.result;

    profilePic = reader.result;

  };

  reader.readAsDataURL(file);

});

document
.getElementById("saveProfile")
.onclick = () => {

  const val =
    document.getElementById("usernameInput")
    .value
    .trim();

  if(val.length < 2){
    alert("Username too short");
    return;
  }

  if(!profilePic){
    alert("Upload a profile picture");
    return;
  }

  username = val;

  localStorage.setItem(
    "chatUsername",
    username
  );

  localStorage.setItem(
    "chatPfp",
    profilePic
  );

  setupModal.style.display = "none";

};

sendBtn.onclick = sendMessage;

messageInput.addEventListener("keypress", e => {

  if(e.key === "Enter"){
    sendMessage();
  }

});

function containsBadWords(text){

  const lower = text.toLowerCase();

  return badWords.some(word =>
    lower.includes(word)
  );

}

function sendMessage(){

  const text =
    messageInput.value.trim();

  if(!text || !username) return;

  if(containsBadWords(text)){
    alert("No cussing allowed");
    return;
  }

  push(ref(db, "messages"), {

    username: username,
    text: text,
    pfp: profilePic,
    time: Date.now()

  });

  messageInput.value = "";

}

const messagesQuery = query(
  ref(db, "messages"),
  limitToLast(100)
);

onChildAdded(messagesQuery, snapshot => {

  const msg = snapshot.val();

  const isMe =
    msg.username === username;

  const row =
    document.createElement("div");

  row.className =
    isMe
      ? "msg-row my-row"
      : "msg-row other-row";

  const div =
    document.createElement("div");

  div.className =
    isMe
      ? "msg my-msg"
      : "msg other-msg";

  div.innerHTML = `

    <img src="${msg.pfp}">

    <div class="msg-content">

      <strong>
        ${escapeHTML(msg.username)}
      </strong>

      ${escapeHTML(msg.text)}

    </div>

  `;

  row.appendChild(div);

  messages.appendChild(row);

  messages.scrollTop =
    messages.scrollHeight;

});

document.addEventListener("keydown", e => {

  if(e.ctrlKey &&
     e.key.toLowerCase() === "m"){

    const pass =
      prompt("Admin Password");

    if(pass !== "kenzo123") return;

    remove(ref(db, "messages"));

    messages.innerHTML = "";

    alert("All messages deleted");

  }

});

function escapeHTML(str){

  return str.replace(
    /[&<>"']/g,
    tag => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[tag])
  );

}

</script>
  
</body>
</html>
