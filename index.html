<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>saving for a yozma</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#070b14;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle,#00a2ff55,transparent 70%);
      top:-200px;
      left:-150px;
      animation:float 8s ease-in-out infinite;
    }

    body::after{
      content:'';
      position:absolute;
      width:600px;
      height:600px;
      background:radial-gradient(circle,#6d28ff55,transparent 70%);
      bottom:-200px;
      right:-150px;
      animation:float 10s ease-in-out infinite reverse;
    }

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(30px);}
      100%{transform:translateY(0px);}
    }

    .card{
      width:90%;
      max-width:700px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(18px);
      border-radius:32px;
      padding:60px;
      text-align:center;
      position:relative;
      z-index:2;
      box-shadow:0 30px 80px rgba(0,0,0,0.45);
    }

    .badge{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(0,162,255,0.12);
      border:1px solid rgba(0,162,255,0.3);
      color:#7fd1ff;
      margin-bottom:25px;
      font-size:0.95rem;
    }

    h1{
      font-size:4rem;
      margin-bottom:18px;
      font-weight:800;
      letter-spacing:-2px;
    }

    .amount{
      font-size:5rem;
      font-weight:800;
      background:linear-gradient(90deg,#00b7ff,#7c4dff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:25px;
    }

    p{
      color:rgba(255,255,255,0.7);
      line-height:1.8;
      font-size:1.1rem;
      max-width:560px;
      margin:auto;
    }

    .progress-wrapper{
      margin-top:45px;
      text-align:left;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:14px;
      color:rgba(255,255,255,0.75);
      font-size:0.95rem;
    }

    .progress-bar{
      width:100%;
      height:22px;
      background:rgba(255,255,255,0.08);
      border-radius:999px;
      overflow:hidden;
      position:relative;
    }

    .progress{
      width:47%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#00b7ff,#7c4dff);
      position:relative;
      animation:load 2s ease;
    }

    @keyframes load{
      from{
        width:0%;
      }
    }

    .progress::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      animation:shine 2.5s infinite;
    }

    @keyframes shine{
      from{
        transform:translateX(-100%);
      }
      to{
        transform:translateX(200%);
      }
    }

    .bottom{
      margin-top:40px;
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .btn{
      padding:15px 28px;
      border-radius:16px;
      text-decoration:none;
      color:white;
      font-weight:700;
      transition:0.3s ease;
    }

    .primary{
      background:linear-gradient(90deg,#00a2ff,#6d28ff);
      box-shadow:0 10px 30px rgba(0,162,255,0.35);
    }

    .secondary{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
    }

    .btn:hover{
      transform:translateY(-4px);
    }

    @media(max-width:700px){
      h1{
        font-size:2.7rem;
      }

      .amount{
        font-size:3.5rem;
      }

      .card{
        padding:40px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Current Financial Goal</div>

    <h1>Goal Progress</h1>

    <div class="amount">
      $1,139.05
    </div>

    <p>
      Working toward something bigger every day.
      saving for a yozma
    </p>

    <div class="progress-wrapper">
      <div class="progress-top">
        <span>Progress - Day 1 ($28)</span>
        <span>2.46%</span>
      </div>

      <div class="progress-bar">
        <div class="progress"></div>
      </div>
    </div>

    <div class="bottom">
      <a href="#" class="btn primary">Support Goal</a>
      <a href="#" class="btn secondary">Learn More</a>
    </div>
  </div>

</body>
</html>
